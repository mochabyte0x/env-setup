- name: Install Tools
  hosts: localhost
  tasks:
  - name: Check if /home/kali/tools exists
    ansible.builtin.stat:
      path: /home/kali/tools
    register: tools_stat
  - name: Create /home/kali/tools
    ansible.builtin.file:
      path: /home/kali/tools
      state: directory
      owner: kali
      group: kali
    when: tools_stat.stat.exists == false
  - name: Check if /home/kali/tools/standalone exists
    ansible.builtin.stat:
      path: /home/kali/tools/standalone
    register: standalone_stat
  - name: Create /home/kali/tools/standalone
    ansible.builtin.file:
      path: /home/kali/tools/standalone
      state: directory
      owner: kali
      group: kali
    when: standalone_stat.stat.exists == false
  - name: pipx install tools
    ansible.builtin.shell:
      cmd: |-
        for d in /home/kali/tools/*/; do
            if [ -f "$d/setup.py" ] || [ -f "$d/pyproject.toml" ]; then
                echo "Installing $d with pipx"
                pipx install "$d"
            fi
        done
- name: Install (some) Dependencies
  hosts: localhost
  become: true
  tasks:
  - name: install pipx
    ansible.builtin.apt:
      name: pipx
      update_cache: 'yes'
  - name: install ntpdate
    ansible.builtin.apt:
      name: ntpsec-ntpdate
      update_cache: 'yes'
  - name: install sshpass
    ansible.builtin.apt:
      name: sshpass
      update_cache: 'yes'
  - name: install gh
    ansible.builtin.apt:
      name: gh
      update_cache: 'yes'
- name: Install VSCode
  hosts: localhost
  become: true
  tasks:
  - name: Check if VSCode is installed
    ansible.builtin.stat:
      path: /usr/bin/code
    register: vscode_stat
  - name: Check if VSCode deb is downloaded
    ansible.builtin.stat:
      path: /tmp/code.deb
    register: vscode_deb_stat
  - name: Download VSCode Debian Package
    ansible.builtin.get_url:
      url: https://vscode.download.prss.microsoft.com/dbazure/download/stable/6f17636121051a53c88d3e605c491d22af2ba755/code_1.103.2-1755709794_amd64.deb
      dest: /tmp/code.deb
      owner: null
      group: null
    register: vscode_deb
    when: vscode_stat.stat.exists == False and vscode_deb_stat.stat.exists == False
  - name: Install VSCode
    ansible.builtin.shell:
      cmd: dpkg -i /tmp/code.deb
- name: Install Tailscale
  hosts: localhost
  become: true
  tasks:
  - name: Check if Tailscale is installed
    ansible.builtin.stat:
      path: /usr/bin/tailscale
    register: tailscale_stat
  - name: Add GPG Keys
    ansible.builtin.shell:
      cmd: |-
        curl -fsSL https://pkgs.tailscale.com/stable/debian/bookworm.noarmor.gpg | sudo tee /usr/share/keyrings/tailscale-archive-keyring.gpg >/dev/null
        curl -fsSL https://pkgs.tailscale.com/stable/debian/bookworm.tailscale-keyring.list | sudo tee /etc/apt/sources.list.d/tailscale.list
    when: tailscale_stat.stat.exists == false
  - name: Install Tailscale
    ansible.builtin.apt:
      name: tailscale
      update_cache: 'yes'
    when: tailscale_stat.stat.exists == false
  - name: Enable and Start Tailscale
    ansible.builtin.systemd_service:
      name: tailscaled
      state: started
      enabled: true
- name: Install Wireguard
  hosts: localhost
  become: true
  tasks:
  - name: install wireguard
    ansible.builtin.apt:
      name: wireguard
      update_cache: 'yes'
  - name: install wg-tools
    ansible.builtin.apt:
      name: wireguard-tools
      update_cache: 'yes'
- name: Install Fonts
  hosts: localhost
  become: true
  tasks:
  - name: fetch jb-mono
    ansible.builtin.get_url:
      url: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/JetBrainsMono.zip
      dest: /tmp/JetBrainsMono.zip
      owner: null
      group: null
  - name: unzip jb-mono
    ansible.builtin.shell:
      cmd: unzip /tmp/JetBrainsMono.zip -d /usr/share/fonts/truetype/jb-mono
  - name: fc-cache
    ansible.builtin.shell:
      cmd: fc-cache -fv
- name: Misc Stuff
  hosts: localhost
  become: true
  tasks:
  - name: Check if rockyou is gz'ed
    ansible.builtin.stat:
      path: /usr/share/wordlists/rockyou.txt.gz
    register: rockyou_stat
  - name: gunzip rockyou
    ansible.builtin.shell:
      cmd: gunzip /usr/share/wordlists/rockyou.txt.gz
    when: rockyou_stat.stat.exists == true
