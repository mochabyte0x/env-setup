- name: Setup Tools via pipx
  hosts: localhost
  tasks:
  - name: Check if /home/mocha/tools exists
    ansible.builtin.stat:
      path: /home/mocha/tools
    register: tools_stat
  - name: Create /home/mocha/tools
    ansible.builtin.file:
      path: /home/mocha/tools
      state: directory
      owner: mocha
      group: mocha
    when: tools_stat.stat.exists == false
  - name: Check if /home/mocha/tools/ad exists
    ansible.builtin.stat:
      path: /home/mocha/tools/ad
    register: ad_stat
  - name: Create /home/mocha/tools/ad
    ansible.builtin.file:
      path: /home/mocha/tools/ad
      state: directory
      owner: mocha
      group: mocha
    when: ad_stat.stat.exists == false
  - name: Check if /home/mocha/tools/transfer/tooling exists
    ansible.builtin.stat:
      path: /home/mocha/tools/transfer/tooling
    register: tooling_stat
  - name: Create /home/mocha/tools/transfer/tooling
    ansible.builtin.file:
      path: /home/mocha/tools/transfer/tooling
      state: directory
      owner: mocha
      group: mocha
    when: tooling_stat.stat.exists == false
  - name: Check if /home/mocha/tools/transfer/tooling/pivot exists
    ansible.builtin.stat:
      path: /home/mocha/tools/transfer/tooling/pivot
    register: pivot_stat
  - name: Create /home/mocha/tools/transfer/tooling/pivot
    ansible.builtin.file:
      path: /home/mocha/tools/transfer/tooling/pivot
      state: directory
      owner: mocha
      group: mocha
    when: pivot_stat.stat.exists == false
  - name: pipx install tools
    ansible.builtin.shell:
      cmd: |-
        for category in /home/mocha/tools/*/; do
            for d in "$category"*/; do
                if [ -f "$d/setup.py" ] || [ -f "$d/pyproject.toml" ]; then
                    echo "Installing $d with pipx"
                    pipx install "$d"
                fi
            done
        done
  - name: pipx install impacket
    ansible.builtin.shell:
      cmd: pipx install impacket
- name: Install zsh and Oh My Zsh
  hosts: localhost
  become: true
  tasks:
  - name: install zsh
    ansible.builtin.apt:
      name: zsh
      update_cache: 'yes'
  - name: install curl for Oh My Zsh installer
    ansible.builtin.apt:
      name: curl
      update_cache: 'yes'
  - name: install git for Oh My Zsh
    ansible.builtin.apt:
      name: git
      update_cache: 'yes'
  - name: Check Oh My Zsh
    ansible.builtin.stat:
      path: /home/mocha/.oh-my-zsh/oh-my-zsh.sh
    register: ohmyzsh_stat
  - name: Install Oh My Zsh unattended
    ansible.builtin.shell:
      cmd: sudo -u mocha env RUNZSH=no CHSH=no sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
        "" --unattended
    when: ohmyzsh_stat.stat.exists == false
  - name: Set default shell to zsh for mocha
    ansible.builtin.user:
      name: mocha
      shell: /usr/bin/zsh
- name: Install VSCode
  hosts: localhost
  become: true
  tasks:
  - name: Check if VSCode is installed
    ansible.builtin.stat:
      path: /usr/bin/code
    register: vscode_stat
  - name: Check if VSCode deb is downloaded
    ansible.builtin.stat:
      path: /tmp/code.deb
    register: vscode_deb_stat
  - name: Download VSCode Debian Package
    ansible.builtin.get_url:
      url: https://vscode.download.prss.microsoft.com/dbazure/download/stable/6f17636121051a53c88d3e605c491d22af2ba755/code_1.109.5-1771531656_amd64.deb
      dest: /tmp/code.deb
    register: vscode_deb
    when: vscode_stat.stat.exists == False and vscode_deb_stat.stat.exists == False
  - name: Install VSCode
    ansible.builtin.shell:
      cmd: dpkg -i /tmp/code.deb
- name: Install Tailscale
  hosts: localhost
  become: true
  tasks:
  - name: Check if Tailscale is installed
    ansible.builtin.stat:
      path: /usr/bin/tailscale
    register: tailscale_stat
  - name: Add GPG Keys
    ansible.builtin.shell:
      cmd: |-
        curl -fsSL https://pkgs.tailscale.com/stable/debian/bookworm.noarmor.gpg | sudo tee /usr/share/keyrings/tailscale-archive-keyring.gpg >/dev/null
        curl -fsSL https://pkgs.tailscale.com/stable/debian/bookworm.tailscale-keyring.list | sudo tee /etc/apt/sources.list.d/tailscale.list
    when: tailscale_stat.stat.exists == false
  - name: Install Tailscale
    ansible.builtin.apt:
      name: tailscale
      update_cache: 'yes'
    when: tailscale_stat.stat.exists == false
  - name: Enable and Start Tailscale
    ansible.builtin.systemd_service:
      name: tailscaled
      state: started
      enabled: true
