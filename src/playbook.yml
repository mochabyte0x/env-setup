- name: Install Packages
  hosts: localhost
  become: true
  tasks:
  - name: install pipx
    ansible.builtin.apt:
      name: pipx
      update_cache: 'yes'
  - name: install ntpdate
    ansible.builtin.apt:
      name: ntpsec-ntpdate
      update_cache: 'yes'
- name: Install Tools
  hosts: localhost
  tasks:
  - name: Check if /home/kali/tools exists
    ansible.builtin.stat:
      path: /home/kali/tools
    register: tools_stat
  - name: Create /home/kali/tools
    ansible.builtin.file:
      path: /home/kali/tools
      state: directory
      owner: kali
      group: kali
    when: tools_stat.stat.exists == false
  - name: Check if /home/kali/tools/standalone exists
    ansible.builtin.stat:
      path: /home/kali/tools/standalone
    register: standalone_stat
  - name: Create /home/kali/tools/standalone
    ansible.builtin.file:
      path: /home/kali/tools/standalone
      state: directory
      owner: kali
      group: kali
    when: standalone_stat.stat.exists == false
  - name: Clone Certipy
    ansible.builtin.git:
      repo: https://github.com/ly4k/Certipy.git
      dest: /home/kali/tools/Certipy
  - name: Clone impacket
    ansible.builtin.git:
      repo: https://github.com/fortra/impacket.git
      dest: /home/kali/tools/impacket
  - name: Clone NetExec
    ansible.builtin.git:
      repo: https://github.com/Pennyw0rth/NetExec.git
      dest: /home/kali/tools/NetExec
  - name: Clone BloodHound.py
    ansible.builtin.git:
      repo: https://github.com/dirkjanm/BloodHound.py.git
      dest: /home/kali/tools/BloodHound.py
  - name: Clone bloodyAD
    ansible.builtin.git:
      repo: https://github.com/CravateRouge/bloodyAD.git
      dest: /home/kali/tools/bloodyAD
  - name: Clone adidnsdump
    ansible.builtin.git:
      repo: https://github.com/dirkjanm/adidnsdump.git
      dest: /home/kali/tools/adidnsdump
  - name: Clone mimikatz
    ansible.builtin.git:
      repo: https://github.com/gentilkiwi/mimikatz.git
      dest: /home/kali/tools/mimikatz
  - name: Clone SharpCollection
    ansible.builtin.git:
      repo: https://github.com/Flangvik/SharpCollection.git
      dest: /home/kali/tools/SharpCollection
  - name: Download SharpHound_v2.7.1_windows_x86.zip
    ansible.builtin.get_url:
      url: https://github.com/SpecterOps/SharpHound/releases/download/v2.7.1/SharpHound_v2.7.1_windows_x86.zip
      dest: /home/kali/tools/standalone/SharpHound_v2.7.1_windows_x86.zip
      owner: null
      group: null
