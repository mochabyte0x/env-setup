- name: Set desktop wallpaper
  hosts: localhost
  become: true
  tasks:
  - name: Ensure mocha Pictures directory
    ansible.builtin.file:
      path: /home/mocha/Pictures
      state: directory
      owner: mocha
      group: mocha
      mode: '0755'
  - name: Install wallpaper image from repo assets
    ansible.builtin.copy:
      src: '{{ playbook_dir }}/assets/23.jpg'
      dest: /home/mocha/Pictures/wallpaper.jpg
      owner: mocha
      group: mocha
      mode: '0644'
  - name: Apply wallpaper (GNOME / KDE Plasma / XFCE)
    ansible.builtin.shell:
      cmd: "uid=$(id -u mocha)\nWP_FILE=\"/home/mocha/Pictures/wallpaper.jpg\"\nWP_URI=\"\
        file:///home/mocha/Pictures/wallpaper.jpg\"\nrun_as() { sudo -u mocha env\
        \ \"DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$uid/bus\" \"$@\"; }\n\n\
        # GNOME\nif command -v gsettings >/dev/null 2>&1; then\n  run_as gsettings\
        \ set org.gnome.desktop.background picture-uri \"$WP_URI\" || true\n  run_as\
        \ gsettings set org.gnome.desktop.background picture-uri-dark \"$WP_URI\"\
        \ || true\nfi\n\n# KDE Plasma \nif command -v plasma-apply-wallpaperimage\
        \ >/dev/null 2>&1; then\n  run_as plasma-apply-wallpaperimage \"$WP_FILE\"\
        \ || true\nfi\n\n# XFCE\nif command -v xfconf-query >/dev/null 2>&1; then\n\
        \  run_as bash -c 'WP_FILE=\"$1\"; for prop in $(xfconf-query -c xfce4-desktop\
        \ -l 2>/dev/null | grep last-image || true); do\n    if xfconf-query -c xfce4-desktop\
        \ -p \"$prop\" >/dev/null 2>&1; then\n      xfconf-query -c xfce4-desktop\
        \ -p \"$prop\" -s \"$WP_FILE\" || true\n    else\n      xfconf-query -c xfce4-desktop\
        \ -p \"$prop\" -n -t string -s \"$WP_FILE\" || true\n    fi\n  done' bash\
        \ \"$WP_FILE\"\nfi"
- name: Configure QTerminal appearance
  hosts: localhost
  become: true
  tasks:
  - name: install qterminal
    ansible.builtin.apt:
      name: qterminal
      update_cache: 'yes'
  - name: Ensure qterminal config directory exists
    ansible.builtin.file:
      path: /home/mocha/.config/qterminal.org
      state: directory
      owner: mocha
      group: mocha
      mode: '0755'
  - name: Merge QTerminal settings into qterminal.ini
    ansible.builtin.shell:
      cmd: |-
        sudo -u mocha python3 <<'PY'
        import configparser
        import pathlib

        path = pathlib.Path.home() / ".config" / "qterminal.org" / "qterminal.ini"
        path.parent.mkdir(parents=True, exist_ok=True)
        cfg = configparser.ConfigParser()
        cfg.optionxform = str
        if path.is_file():
            cfg.read(path)
        if not cfg.has_section("General"):
            cfg.add_section("General")
        G = cfg["General"]
        updates = {
            "fontFamily": "JetBrainsMono Nerd Font",
            "fontSize": "14",
            "colorScheme": "Kali-Dark",
            "TerminalTransparency": "2",
            "TerminalMargin": "5",
            "TerminalBackgroundMode": "0",
            "TerminalBackgroundImage": "",
            "ScrollbarPosition": "2",
            "TabsPosition": "0",
            "KeyboardCursorShape": "2",
            "KeyboardCursorBlink": "false",
            "BoldIntense": "true",
            "showTerminalSizeHint": "true",
            "enabledBidiSupport": "true",
            "UseFontBoxDrawingChars": "true",
            "Borderless": "false",
            "focusOnMoueOver": "false",
            "ChangeWindowTitle": "true",
            "ChangeWindowIcon": "true",
            "TerminalsPreset": "0",
        }
        for k, v in updates.items():
            G[k] = str(v)
        if cfg.has_option("General", "guiStyle"):
            cfg.remove_option("General", "guiStyle")
        with path.open("w") as f:
            cfg.write(f)
        PY
- name: Misc Stuff
  hosts: localhost
  become: true
  tasks:
  - name: Check if rockyou is gz'ed
    ansible.builtin.stat:
      path: /usr/share/wordlists/rockyou.txt.gz
    register: rockyou_stat
  - name: gunzip rockyou
    ansible.builtin.shell:
      cmd: gunzip /usr/share/wordlists/rockyou.txt.gz
    when: rockyou_stat.stat.exists == true
