- name: Install (some) Dependencies
  hosts: localhost
  become: true
  tasks:
  - name: install pipx
    ansible.builtin.apt:
      name: pipx
      update_cache: 'yes'
  - name: remove python3-impacket
    ansible.builtin.apt:
      name: python3-impacket
      state: absent
  - name: remove impacket-scripts
    ansible.builtin.apt:
      name: impacket-scripts
      state: absent
  - name: install ntpdate
    ansible.builtin.apt:
      name: ntpsec-ntpdate
      update_cache: 'yes'
  - name: install sshpass
    ansible.builtin.apt:
      name: sshpass
      update_cache: 'yes'
  - name: install gh
    ansible.builtin.apt:
      name: gh
      update_cache: 'yes'
