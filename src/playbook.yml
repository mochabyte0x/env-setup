- name: Install Fonts
  hosts: localhost
  become: true
  tasks:
  - name: fetch jb-mono
    ansible.builtin.get_url:
      url: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/JetBrainsMono.zip
      dest: /tmp/JetBrainsMono.zip
      owner: null
      group: null
  - name: unzip jb-mono
    ansible.builtin.shell:
      cmd: unzip /tmp/JetBrainsMono.zip -d /usr/share/fonts/truetype/jb-mono
  - name: fc-cache
    ansible.builtin.shell:
      cmd: fc-cache -fv
